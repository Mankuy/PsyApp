version: '3.8'
services:
  api:
    build: ./packages/api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./prisma/dev.db
    volumes:
      - ./packages/api/prisma:/app/prisma

  web:
    build: ./packages/web
    ports:
      - "5173:5173"
    depends_on:
      - api
